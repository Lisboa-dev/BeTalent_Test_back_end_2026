version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: adonis_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123         
      MYSQL_DATABASE: adonis-payment-manager
      MYSQL_USER: adonis                 
      MYSQL_PASSWORD: adonis
    ports:
      - "3360:3306"
    networks:
      - backend
    command: >
      --default-authentication-plugin=mysql_native_password
      --bind-address=0.0.0.0
      --skip-host-cache
      --skip-name-resolve

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - backend

  app:
    build: .
    container_name: adonis_app
    ports:
      - "3333:3333"
    depends_on:
      - mysql
      - redis
      - gateways
    env_file:
      - docker.env
    
    networks:
      - backend
    

  gateways:
    image: matheusprotzen/gateways-mock
    container_name: gateways_mock
    ports:
      - "3001:3001"
      - "3002:3002"
    networks:
      - backend

networks:
  backend:
    driver: bridge
