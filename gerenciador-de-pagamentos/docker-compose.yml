services:
  

  mysql:
    image: mysql:8.0
    container_name: adonis_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: adonis-payment-manager
      MYSQL_USER: adonis
      MYSQL_PASSWORD: adonis
    ports:
      - "3360:3306"
    networks:
      - backend
    

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - backend

 
  app:
      build: .
      ports:
        - "3333:3333"
      depends_on:
        - db
        - redis
        - gateways
      env_file:
        - .env
      networks:
      - backend
   
  gateways:
      image: matheusprotzen/gateways-mock
      ports:
       - 3001:3001
       - 3002:3002
      networks:
      - backend

  